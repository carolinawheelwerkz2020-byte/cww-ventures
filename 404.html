<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found | CWW Ventures</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#04080f;--accent2:#38b6e8;--accent3:#4d9fff;--text:#f0f4fa;--text-mid:#6a8aaa;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.code{font-family:'Bebas Neue',sans-serif;font-size:clamp(6rem,20vw,14rem);letter-spacing:.05em;background:linear-gradient(135deg,var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,4vw,3rem);letter-spacing:.1em;margin-top:1rem;color:var(--text);}
.sub{font-family:'Inter',sans-serif;font-size:.9rem;font-weight:300;color:var(--text-mid);margin-top:1rem;line-height:1.7;max-width:400px;}
.back{display:inline-block;margin-top:2.5rem;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:.85rem 2.4rem;border:1px solid var(--accent3);color:var(--accent2);text-decoration:none;transition:background .3s,color .3s;}
.back:hover{background:var(--accent3);color:var(--bg);}
</style>
</head>
<body>
<div class="code">404</div>
<div class="title">Page Not Found</div>
<p class="sub">The page you're looking for doesn't exist or has been moved.</p>
<a href="/" class="back">Back to Home</a>
</body>
</html>
